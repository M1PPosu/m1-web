map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

resolver 127.0.0.11 valid=10s;
resolver_timeout 5s;

upstream php_backend {
    zone php_backend 64k;
    server php:8000 resolve;
}

upstream assets_backend {
    zone assets_backend 64k;
    server assets:8080 resolve;
}

upstream notification_backend {
    zone notification_backend 64k;
    server notification-server:2345 resolve;
}

proxy_set_header Host $http_host;
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Port 443;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
proxy_http_version 1.1;

client_max_body_size 32m;

server {
    listen 80 default_server;

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    proxy_hide_header X-Powered-By;

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /home/notifications/feed {
        proxy_pass http://notification_backend;
    }

    location ~ ^/(?:assets|downloads|images|uploads|uploads-avatar|uploads-replay|videos)(?:/|$) {
        proxy_pass http://assets_backend;
    }

    location ~ ^/(?:apple-touch-icon\.png|favicon\.ico|robots\.txt|site\.webmanifest)$ {
        proxy_pass http://assets_backend;
    }

    location / {
        proxy_pass http://php_backend;
    }
}
