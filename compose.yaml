x-runtime-environment: &runtime-environment
  BEATMAPS_DIFFICULTY_CACHE_SERVER_URL: http://beatmap-difficulty-lookup-cache:8080
  BROADCAST_DRIVER: redis
  DB_CONNECTION_STRING: "Server=db;Database=osu;Uid=osuweb;Pwd=${DB_PASSWORD}"
  DB_HOST: db
  DB_USERNAME: osuweb
  ES_HOST: http://elasticsearch:9200
  ES_SOLO_SCORES_HOST: http://elasticsearch:9200
  LOG_CHANNEL: stderr
  NOTIFICATION_REDIS_HOST: m1-web-redis
  REDIS_HOST: m1-web-redis
  TRUSTED_PROXIES: 172.24.0.0/16

x-app-volumes: &app-volumes
  - app-storage:/app/storage/app
  - uploads:/app/public/uploads
  - uploads-avatar:/app/public/uploads-avatar
  - uploads-replay:/app/public/uploads-replay
  - ./storage/oauth-public.key:/app/storage/oauth-public.key:ro
  - ./storage/oauth-private.key:/app/storage/oauth-private.key:ro

x-app: &app
  image: "m1-web-app:${M1PP_IMAGE_TAG:-local}"
  build:
    context: .
    dockerfile: Dockerfile.deployment
    args:
      APP_URL: "${APP_URL}"
      DOCS_URL: "${DOCS_URL:-https://docs.ppy.sh}"
      GIT_SHA: "${GIT_SHA:-local}"
  env_file:
    - .env
  environment:
    <<: *runtime-environment
  init: true
  networks:
    - default
    - bancho
  restart: unless-stopped
  volumes: *app-volumes

services:
  php:
    <<: *app
    command: ['octane', '--workers=4', '--max-requests=500']
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 8000) ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  assets:
    <<: *app
    command: ['assets']
    networks:
      - default
    volumes:
      - uploads:/app/public/uploads:ro
      - uploads-avatar:/app/public/uploads-avatar:ro
      - uploads-replay:/app/public/uploads-replay:ro
    healthcheck:
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 8080) ? 0 : 1);"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  job:
    <<: *app
    command:
      - artisan
      - queue:work
      - --queue=notification,default,beatmap_high,beatmap_default,imagesize
      - --tries=3
      - --timeout=1000
      - --sleep=1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    <<: *app
    command: ['artisan', 'schedule:work']
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  live-sync:
    <<: *app
    command: ['artisan', 'm1pposu:live:listen', '--no-interaction']
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  beatmap-difficulty-lookup-cache:
    image: pppy/osu-beatmap-difficulty-lookup-cache@sha256:2c306f046ff31a3658e3474634f3276f1a7f6b20eb2bc7e99a49b8dab7b74e8c
    restart: unless-stopped

  notification-server:
    image: pppy/osu-notification-server@sha256:ba9fe35c2d4baacbd94737d28d9f974799e3d6bb51dd6ceb76c8a7f63f66fa46
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      <<: *runtime-environment
      PASSPORT_PUBLIC_KEY: "${PASSPORT_PUBLIC_KEY:-}"
    restart: unless-stopped
    volumes:
      - ./storage/oauth-public.key:/app/oauth-public.key:ro

  db:
    image: mysql@sha256:9c3380eac945af0736031b200027f581925927c81e010056214a4bd6b6693714
    environment:
      MYSQL_APP_HOST: "${MYSQL_APP_HOST}"
      MYSQL_APP_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    secrets:
      - mysql_root_password
    volumes:
      - database:/var/lib/mysql
      - ./docker/deployment/db-init.sh:/docker-entrypoint-initdb.d/db-init.sh:ro

  redis:
    image: redis@sha256:0a972391db0b24ec336e35d1bc98b237237e26f82bf5120cf2f6b1688d1df973
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      default:
        aliases:
          - m1-web-redis
    volumes:
      - redis:/data

  elasticsearch:
    image: elasticsearch@sha256:fa2d4b8b61463150d12533712cd7e656423ec9d1fb1ea81dc6bade7816ad528d
    environment:
      action.auto_create_index: "false"
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      ingest.geoip.downloader.enabled: "false"
    healthcheck:
      test: curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow >/dev/null
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data

  nginx:
    image: nginx@sha256:608a100c71651bf5b773c89083b4a1ad7ef4b2bd05d7a7e552271e03123692ad
    depends_on:
      assets:
        condition: service_healthy
      notification-server:
        condition: service_started
      php:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
    ports:
      - "${NGINX_BIND_ADDRESS:-127.0.0.1}:${NGINX_PORT:-8088}:80"
    restart: unless-stopped
    volumes:
      - ./docker/deployment/nginx-default.conf:/etc/nginx/conf.d/default.conf:ro

  score-indexer:
    image: pppy/osu-elastic-indexer@sha256:2001a2d27d4bf7378c0c678fa6d9b2466e20219d0c463ad82da27a16a8a4ec44
    command: ["queue", "watch"]
    depends_on:
      db:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *runtime-environment
      SCHEMA: "${SCHEMA:-1}"
    restart: unless-stopped

networks:
  bancho:
    external: true
    name: bancho_network

volumes:
  app-storage:
  database:
  elasticsearch:
  redis:
  uploads:
  uploads-avatar:
  uploads-replay:

secrets:
  mysql_root_password:
    file: ${MYSQL_ROOT_PASSWORD_FILE}
